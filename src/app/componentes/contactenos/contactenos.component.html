<div class="contact-form-container">

  <div class="back-button">
    <button type="button" class="btn btn-outline-secondary" routerLink="/inicio">
      <i class="bi bi-arrow-left"></i> {{ t.contactenos.volverInicio }}
    </button>
  </div>

  <div class="form-header">
    <h1>{{ t.contactenos.titulo }}</h1>
    <p>{{ t.contactenos.subtitulo }}</p>
  </div>

  <form [formGroup]="contactoForm" (ngSubmit)="onSubmit()">

    <div class="form-section">
      <h3 class="section-title">{{ t.contactenos.infoPersonal }}</h3>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">{{ t.contactenos.nombreCompleto }}</label>
          <input type="text" class="form-control" formControlName="nombre">
          <small class="text-danger"
                 *ngIf="contactoForm.get('nombre')?.touched && contactoForm.get('nombre')?.invalid">
            {{ t.contactenos.errorNombre }}
          </small>
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">{{ t.contactenos.telefono }}</label>
          <input type="tel" class="form-control" formControlName="telefono">
          <small class="text-danger"
                 *ngIf="contactoForm.get('telefono')?.touched && contactoForm.get('telefono')?.invalid">
            {{ t.contactenos.errorTelefono }}
          </small>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">{{ t.contactenos.correoElectronico }}</label>
        <input type="email" class="form-control" formControlName="correo">
        <small class="text-danger"
               *ngIf="contactoForm.get('correo')?.touched && contactoForm.get('correo')?.invalid">
          {{ t.contactenos.errorCorreo }}
        </small>
      </div>
    </div>

    <div class="form-section">
      <h3 class="section-title">{{ t.contactenos.tuMensaje }}</h3>

      <div class="mb-3">
        <label class="form-label">{{ t.contactenos.asunto }}</label>
        <input type="text" class="form-control" formControlName="asunto">
      </div>

      <div class="mb-3">
        <label class="form-label">{{ t.contactenos.mensaje }}</label>
        <textarea class="form-control" formControlName="mensaje"
                  [placeholder]="t.contactenos.placeholderMensaje"></textarea>

        <small style="color: var(--primary);">
          {{ t.contactenos.maxCaracteres }}
        </small>
      </div>
    </div>

    <div class="mb-4 d-flex justify-content-center">
      @if (captchaActivo) {
        <re-captcha
          (resolved)="resolved($event)"
          [theme]="temaActual">
        </re-captcha>
      }
    </div>

    <div class="form-navigation">
      <button type="submit" class="btn btn-primary w-100" [disabled]="contactoForm.invalid || !captchaToken">
        {{ t.contactenos.enviarMensaje }}
      </button>
    </div>

  </form>
</div>
