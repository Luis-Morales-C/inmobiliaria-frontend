  <div class="container py-4">

    <!-- FILTROS -->
    <div class="search-box mb-4">
      <h4 class="mb-3"> Filtrar Propiedades</h4>
      <div class="row g-3">

        <!-- Departamento -->
        <div class="col-md-3">
          <label class="form-label">Departamento</label>
          <select class="form-select" [(ngModel)]="filtros.departamento"
                  (change)="onDepartamentoChange($event)">
            <option value="">Todos</option>
            <option *ngFor="let d of departamentos" [value]="d">{{ d }}</option>
          </select>
        </div>

        <!-- Ciudad -->
        <div class="col-md-3">
          <label class="form-label">Ciudad</label>
          <select class="form-select" [(ngModel)]="filtros.ciudad"
                  [disabled]="ciudadesFiltradas.length === 0">
            <option value="">
              {{ ciudadesFiltradas.length === 0 ? 'Selecciona un departamento' : 'Todas' }}
            </option>
            <option *ngFor="let c of ciudadesFiltradas" [value]="c">{{ c }}</option>
          </select>
        </div>

        <div class="col-md-3">
          <label class="form-label">Tipo de inmueble</label>
          <select class="form-select" [(ngModel)]="filtros.tipo">
            <option value="">Todos</option>
            <option *ngFor="let t of tiposInmueble" [value]="t">{{ t }}</option>
          </select>
        </div>

        <div class="col-md-3">
          <label class="form-label">Tipo de negocio</label>
          <select class="form-select" [(ngModel)]="filtros.tipoNegocio">
            <option value="">Todos</option>
            <option *ngFor="let t of tiposNegocio" [value]="t">{{ t }}</option>
          </select>
        </div>

        <div class="col-md-3">
          <label class="form-label">Precio mínimo</label>
          <input type="number" class="form-control" [(ngModel)]="filtros.precioMin" placeholder="$ Mínimo">
        </div>

        <div class="col-md-3">
          <label class="form-label">Precio máximo</label>
          <input type="number" class="form-control" [(ngModel)]="filtros.precioMax" placeholder="$ Máximo">
        </div>

        <div class="col-md-3">
          <label class="form-label">Habitaciones mínimas</label>
          <select class="form-select" [(ngModel)]="filtros.habitacionesMin">
            <option [ngValue]="null">Cualquiera</option>
            <option [ngValue]="1">1+</option>
            <option [ngValue]="2">2+</option>
            <option [ngValue]="3">3+</option>
            <option [ngValue]="4">4+</option>
          </select>
        </div>

        <div class="col-md-3">
          <label class="form-label">Baños mínimos</label>
          <select class="form-select" [(ngModel)]="filtros.banosMin">
            <option [ngValue]="null">Cualquiera</option>
            <option [ngValue]="1">1+</option>
            <option [ngValue]="2">2+</option>
            <option [ngValue]="3">3+</option>
          </select>
        </div>

        <div class="col-md-3">
          <label class="form-label">Estado del inmueble</label>
          <select class="form-select" [(ngModel)]="filtros.estado">
            <option value="">Todos</option>
            <option value="NUEVO">Nuevo</option>
            <option value="USADO">Usado</option>
          </select>
        </div>

        <div class="col-md-3">
          <label class="form-label">Parqueaderos </label>
          <select class="form-select" [(ngModel)]="filtros.parqueaderosMin">
            <option [ngValue]="null">Cualquiera</option>
            <option [ngValue]="0">0</option>
            <option [ngValue]="1">1</option>
            <option [ngValue]="2">2</option>
            <option [ngValue]="3">3</option>
          </select>
        </div>

        <div class="col-12 d-flex gap-2 justify-content-end">
          <button class="btn btn-outline-secondary" (click)="limpiarFiltros()">Limpiar</button>
          <button class="btn btn-primary px-4" (click)="buscar()">Buscar</button>
        </div>

      </div>
    </div>

    <!-- RESULTADOS -->
    <div *ngIf="cargando" class="text-center py-5">
      <div class="spinner-border text-primary"></div>
      <p class="mt-2">Buscando propiedades...</p>
    </div>

    <div *ngIf="!cargando && inmuebles.length === 0" class="text-center py-5">
      <i class="bi bi-house-x fs-1 text-muted"></i>
      <p class="mt-2 text-muted">No se encontraron propiedades con esos filtros.</p>
      <button class="btn btn-outline-primary" (click)="limpiarFiltros()">Ver todas</button>
    </div>

    <div class="row g-4" *ngIf="!cargando && inmuebles.length > 0">
      <div class="col-md-4" *ngFor="let p of inmuebles">
        <div class="property-card card h-100">
          <div class="position-relative">
            <img [src]="p.imagenes[0] || 'https://via.placeholder.com/400x250'"
                 class="card-img-top" style="height:200px; object-fit:cover;" alt="Inmueble">
            <span class="property-badge badge bg-primary position-absolute top-0 end-0 m-2">
                  {{ p.tipoNegocio }}
            </span>
          </div>
          <div class="card-body d-flex flex-column">
            <h5 class="property-price text-success fw-bold">
              {{ p.precio | currency:'COP':'symbol':'1.0-0' }}
            </h5>
            <h6 class="card-title">{{ p.tipo }} · {{ p.ciudad }}</h6>
            <p class="text-muted small mb-2">{{ p.descripcion | slice:0:80 }}...</p>
            <div class="d-flex gap-3 text-muted small mb-3">
              <span><i class="bi bi-door-closed"></i> {{ p.habitaciones }} hab.</span>
              <span><i class="bi bi-droplet"></i> {{ p.banos }} baños</span>
              <span><i class="bi bi-arrows-angle-expand"></i> {{ p.medidas }} m²</span>
            </div>
            <button class="btn btn-primary mt-auto" (click)="abrirDetalle(p)">
              Ver detalles
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- PAGINACIÓN -->
    <nav class="mt-4 d-flex justify-content-center" *ngIf="totalPaginas > 1">
      <ul class="pagination">
        <li class="page-item" [class.disabled]="paginaActual === 0">
          <button class="page-link" (click)="buscar(paginaActual - 1)">‹</button>
        </li>
        <li class="page-item" *ngFor="let p of paginas"
            [class.active]="p === paginaActual">
          <button class="page-link" (click)="buscar(p)">{{ p + 1 }}</button>
        </li>
        <li class="page-item" [class.disabled]="paginaActual === totalPaginas - 1">
          <button class="page-link" (click)="buscar(paginaActual + 1)">›</button>
        </li>
      </ul>
    </nav>
  </div>
  <!-- MODAL FUERA DEL CONTAINER -->
  <app-detalle-inmueble
    *ngIf="mostrarDetalle && inmuebleSeleccionado"
    [inmueble]="inmuebleSeleccionado!"
    (cerrar)="mostrarDetalle = false; inmuebleSeleccionado = null">
  </app-detalle-inmueble>
