<!-- Botón flotante -->
<button class="chat-fab" (click)="toggle()" [class.open]="isOpen" aria-label="Abrir asistente">
  <svg *ngIf="!isOpen" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
    <path d="M2.678 11.894a1 1 0 0 1 .287.801 11 11 0 0 1-.398 2c1.395-.323 2.247-.697 2.634-.893a1 1 0 0 1 .71-.074A8 8 0 0 0 8 14c3.996 0 7-2.807 7-6s-3.004-6-7-6S1 4.807 1 8c0 1.468.617 2.83 1.678 3.894m-.493 3.905a22 22 0 0 1-.713.129c-.2.032-.352-.176-.273-.362a10 10 0 0 0 .244-.637l.003-.01c.248-.72.45-1.548.524-2.319C.743 11.37 0 9.76 0 8c0-3.866 3.582-7 8-7s8 3.134 8 7-3.582 7-8 7a9 9 0 0 1-2.347-.306c-.52.263-1.639.742-3.468 1.105"/>
  </svg>
  <svg *ngIf="isOpen" xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 16 16">
    <path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708"/>
  </svg>
</button>

<!-- Ventana del chat -->
<div class="chat-window" [class.visible]="isOpen">
  <!-- Header -->
  <div class="chat-header">
    <div class="chat-avatar">🏡</div>
    <div>
      <div class="chat-title">Asistente EDÉN</div>
      <div class="chat-subtitle">Siempre disponible</div>
    </div>
    <div class="chat-header-actions">
      <button class="chat-icon-btn" (click)="resetChat()" title="Reiniciar conversación">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" viewBox="0 0 16 16">
          <path d="M11.534 7h3.932a.25.25 0 0 1 .192.41l-1.966 2.36a.25.25 0 0 1-.384 0l-1.966-2.36a.25.25 0 0 1 .192-.41zm-11 2h3.932a.25.25 0 0 0 .192-.41L2.692 6.23a.25.25 0 0 0-.384 0L.342 8.59A.25.25 0 0 0 .534 9z"/>
          <path fill-rule="evenodd" d="M8 3c-1.552 0-2.94.707-3.857 1.818a.5.5 0 1 1-.771-.636A6.002 6.002 0 0 1 13.917 7H12.9A5.002 5.002 0 0 0 8 3M3.1 9a5.002 5.002 0 0 0 8.757 2.182.5.5 0 1 1 .771.636A6.002 6.002 0 0 1 2.083 9z"/>
        </svg>
      </button>
      <button class="chat-icon-btn" (click)="close()" title="Cerrar">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" viewBox="0 0 16 16">
          <path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Mensajes -->
  <div class="chat-body" #chatBody>
    <div
      *ngFor="let msg of messages"
      class="chat-msg"
      [class.bot]="msg.from === 'bot'"
      [class.user]="msg.from === 'user'">
      <div class="chat-bubble" [innerHTML]="msg.text | chatNewline"></div>
    </div>

    <!-- Opciones -->
    <div class="chat-options" *ngIf="currentOptions.length > 0">
      <button
        *ngFor="let opt of currentOptions"
        class="chat-opt-btn"
        (click)="selectOption(opt)">
        {{ opt.label }}
      </button>
    </div>
  </div>
</div>
